owner: lachmanfrantisek
repo: upptime

sites:
  - name: Scoutcloud (Nextcloud)
    url: https://scoutcloud.eu/status.php
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"maintenance":false'

  - name: Lachmanovi (Nextcloud)
    url: https://lachmanovi.eu/status.php
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"maintenance":false'

  - name: Home Assistant
    url: https://home.r.lachmanovi.eu

  - name: Metalignum (WordPress)
    url: https://metalignum.cz

  - name: Collabora Office
    url: https://office.scoutcloud.eu

  - name: Cockpit
    url: https://cockpit.lachmanovi.eu

  - name: Beszel Monitor
    url: https://monitor.lachmanovi.eu

  - name: ScoutCloud DAV
    url: https://scoutcloud.eu/remote.php/dav/
    method: PROPFIND
    headers:
      - "Authorization: Basic $NC_SCOUT_AUTH"
      - "Depth: 0"
    expectedStatusCodes:
      - 207
    __dangerous__body_down_if_text_missing: "multistatus"

  - name: Family DAV
    url: https://lachmanovi.eu/remote.php/dav/
    method: PROPFIND
    headers:
      - "Authorization: Basic $NC_FAMILY_AUTH"
      - "Depth: 0"
    expectedStatusCodes:
      - 207
    __dangerous__body_down_if_text_missing: "multistatus"

  - name: ScoutCloud Login
    url: https://scoutcloud.eu/login
    expectedStatusCodes:
      - 200

  - name: Family Login
    url: https://lachmanovi.eu/login
    expectedStatusCodes:
      - 200

  - name: ntfy Notifications
    url: https://ntfy.lachmanovi.eu/v1/health
    expectedStatusCodes:
      - 200

status-website:
  cname: status.lachmanovi.eu
  name: Server Status
  theme: dark
  introMessage: "Server uptime monitoring for lachmanovi.eu services."
